name: hygiene

on:
  push:
  pull_request:

jobs:
  hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Hygiene scan (no personal IP / home path / personal email / .env / large binary)
        run: bash scripts/check-hygiene.sh --all

      - name: gitleaks (secret scan over history)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
