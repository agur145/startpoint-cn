<!doctype html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/public/tailwind.css">
    <title>Starpoint - Player</title>
</head>

<body
    class="bg-background text-on-surface relative mt-16 m-auto max-w-screen-2xl min-h-screen box-border flex flex-col items-start px-3 pb-3">
    <header class="flex gap-3 items-center md:justify-start justify-center mb-3 w-full">
        <img src="/public/img/logo.png" class="w-9 h-9">
        <h1 class="text-4xl mt-4 font-black mb-4 text-on-background">Starpoint</h1>
    </header>
    <div class="md:grid md:grid-cols-sidebar flex flex-col gap-5 w-full h-fit">
        <nav class="px-3 py-5 gap-3 flex flex-col bg-surface-container-low rounded-3xl h-fit w-full">
            <a href="/"
                class="px-5 py-3 flex gap-3 items-center rounded-full hover:bg-surface-container-high text-on-surface text-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                    class="fill-on-surface">
                    <path d="M520-600v-240h320v240H520ZM120-440v-400h320v400H120Zm400 320v-400h320v400H520Zm-400 0v-240h320v240H120Zm80-400h160v-240H200v240Zm400 320h160v-240H600v240Zm0-480h160v-80H600v80ZM200-200h160v-80H200v80Zm160-320Zm240-160Zm0 240ZM360-280Z" />
                </svg>
                Dashboard
            </a>
            <a href="/player"
                class="px-5 py-3 flex gap-3 items-center rounded-full bg-primary text-on-primary text-lg font-bold">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px"
                    class="fill-on-primary">
                    <path d="M40-160v-112q0-34 17.5-62.5T104-378q62-31 126-46.5T360-440q66 0 130 15.5T616-378q29 15 46.5 43.5T680-272v112H40Zm720 0v-120q0-44-24.5-84.5T666-434q51 6 96 20.5t84 35.5q36 20 55 44.5t19 53.5v120H760ZM360-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47Zm400-160q0 66-47 113t-113 47q-11 0-28-2.5t-28-5.5q27-32 41.5-71t14.5-81q0-42-14.5-81T544-792q14-5 28-6.5t28-1.5q66 0 113 47t47 113ZM120-240h480v-32q0-11-5.5-20T580-306q-54-27-109-40.5T360-360q-56 0-111 13.5T140-306q-9 5-14.5 14t-5.5 20v32Zm240-320q33 0 56.5-23.5T440-640q0-33-23.5-56.5T360-720q-33 0-56.5 23.5T280-640q0 33 23.5 56.5T360-560Zm0 320Zm0-400Z" />
                </svg>
                Players
            </a>
        </nav>
        <article class="w-full flex flex-col gap-4">
            <h1 class="text-4xl font-bold text-on-background">Player "{{playerName}}"</h1>
            <h2 class="text-2xl text-on-surface-variant">"{{playerComment}}"</h2>

            <!-- Resources -->
            <section class="p-5 border border-outline-variant rounded-3xl bg-surface-container">
                <h3 class="text-lg font-semibold mb-3">资源</h3>
                <div class="grid grid-cols-5 gap-2">{{resources}}</div>
            </section>

            <!-- Characters -->
            <section class="p-5 border border-outline-variant rounded-3xl bg-surface-container">
                <h3 class="text-lg font-semibold mb-3">角色 ({{characterCount}}个)</h3>
                <table class="w-full text-sm mb-3">
                    <thead><tr class="text-left border-b border-outline-variant">
                        <th class="p-1">code</th><th class="p-1">进化</th><th class="p-1">exp</th><th class="p-1">突破</th><th class="p-1"></th>
                    </tr></thead>
                    <tbody>{{characterRows}}</tbody>
                </table>
                <div class="flex gap-2 items-center">
                    <input id="charCode" type="text" placeholder="business code" class="bg-surface-container rounded border border-outline-variant p-1 w-32 text-sm">
                    <button onclick="addChar()" class="text-sm bg-primary text-on-primary px-3 py-1 rounded-full">添加角色</button>
                    <span id="charMsg" class="text-xs text-on-surface-variant"></span>
                </div>
            </section>

            <!-- Items -->
            <section class="p-5 border border-outline-variant rounded-3xl bg-surface-container">
                <h3 class="text-lg font-semibold mb-3">道具</h3>
                <table class="w-full text-sm mb-3">
                    <thead><tr class="text-left border-b border-outline-variant">
                        <th class="p-1">ID</th><th class="p-1">数量</th><th class="p-1"></th>
                    </tr></thead>
                    <tbody>{{itemRows}}</tbody>
                </table>
                <div class="flex gap-2 items-center">
                    <input id="itemId" type="text" placeholder="道具ID" class="bg-surface-container rounded border border-outline-variant p-1 w-24 text-sm">
                    <input id="itemCount" type="number" value="1" class="bg-surface-container rounded border border-outline-variant p-1 w-16 text-sm">
                    <button onclick="addItem()" class="text-sm bg-primary text-on-primary px-3 py-1 rounded-full">添加道具</button>
                    <span id="itemMsg" class="text-xs text-on-surface-variant"></span>
                </div>
            </section>

            <!-- Equipment -->
            <section class="p-5 border border-outline-variant rounded-3xl bg-surface-container">
                <h3 class="text-lg font-semibold mb-3">装备</h3>
                <table class="w-full text-sm">
                    <thead><tr class="text-left border-b border-outline-variant">
                        <th class="p-1">ID</th><th class="p-1">Lv</th><th class="p-1">觉醒</th>
                    </tr></thead>
                    <tbody>{{equipRows}}</tbody>
                </table>
            </section>

            <!-- Account settings -->
            <section class="p-5 border border-outline-variant rounded-3xl bg-surface-container">
                <h3 class="text-lg font-semibold mb-3">账号设置</h3>
                <div class="grid grid-cols-4 gap-3 text-sm">
                    <div><label class="text-xs text-on-surface-variant">名字</label>
                        <input class="bg-surface-container rounded border border-outline-variant p-1 w-full" value="{{playerName}}" onchange="editField('name', this.value)"></div>
                    <div><label class="text-xs text-on-surface-variant">签名</label>
                        <input class="bg-surface-container rounded border border-outline-variant p-1 w-full" value="{{playerComment}}" onchange="editField('comment', this.value)"></div>
                    <div><label class="text-xs text-on-surface-variant">生日(YYYYMMDD)</label>
                        <input class="bg-surface-container rounded border border-outline-variant p-1 w-full" value="{{birth}}" onchange="editField('birth', this.value)"></div>
                    <div><label class="text-xs text-on-surface-variant">degreeId</label>
                        <input class="bg-surface-container rounded border border-outline-variant p-1 w-full" value="{{degreeId}}" onchange="editField('degreeId', this.value)"></div>
                    <div><label class="text-xs text-on-surface-variant">tutorial_step</label>
                        <input class="bg-surface-container rounded border border-outline-variant p-1 w-full" value="{{tutorialStep}}" onchange="editField('tutorialStep', this.value)"></div>
                    <div class="flex items-center gap-2 pt-4">
                        <input id="auto3x" type="checkbox" {{auto3x}} onchange="editField('enableAuto3x', this.checked)">
                        <label class="text-sm" for="auto3x">3x加速</label>
                    </div>
                    <div class="flex items-center gap-2 pt-4">
                        <input id="tutorialSkip" type="checkbox" {{tutorialSkip}} onchange="editField('tutorialSkipFlag', this.checked)">
                        <label class="text-sm" for="tutorialSkip">教程跳过</label>
                    </div>
                </div>
            </section>

            <!-- Download/Upload -->
            <section class="p-5 border border-outline-variant rounded-3xl bg-surface-container flex gap-5 items-center flex-wrap">
                <a href="/api/player/save?id={{playerId}}"
                    class="text-sm bg-primary text-on-primary h-[40px] px-[24px] rounded-full flex items-center justify-center">
                    下载 JSON
                </a>
                <form method="post" action="/api/player/save?id={{playerId}}" enctype="multipart/form-data" class="flex items-center gap-3">
                    <input name="save-data" type="file" accept=".json,.txt" class="text-sm">
                    {{uploadError}}
                    <button type="submit" class="text-sm bg-primary text-on-primary h-[40px] px-[24px] rounded-full flex items-center justify-center">
                        上传 JSON
                    </button>
                </form>
            </section>
        </article>
    </div>

    <script>
    const PID = '{{playerId}}';

    async function editField(field, value) {
        const r = await fetch('/api/player/' + PID + '/field', {
            method: 'PATCH',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'field=' + encodeURIComponent(field) + '&value=' + encodeURIComponent(value)
        });
        const d = await r.json();
        if (!r.ok) alert(d.error);
    }

    async function addChar() {
        const code = document.getElementById('charCode').value;
        const r = await fetch('/api/player/' + PID + '/character', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'code=' + encodeURIComponent(code)
        });
        if (r.ok) location.reload();
        else { const d = await r.json(); document.getElementById('charMsg').textContent = d.error; }
    }

    async function delChar(code) {
        if (!confirm('删除角色 ' + code + '?')) return;
        const r = await fetch('/api/player/' + PID + '/character/' + code, { method: 'DELETE' });
        if (r.ok) location.reload();
    }

    async function addItem() {
        const id = document.getElementById('itemId').value;
        const count = document.getElementById('itemCount').value;
        const r = await fetch('/api/player/' + PID + '/item', {
            method: 'POST',
            headers: {'Content-Type': 'application/x-www-form-urlencoded'},
            body: 'id=' + encodeURIComponent(id) + '&count=' + encodeURIComponent(count)
        });
        if (r.ok) location.reload();
        else { const d = await r.json(); document.getElementById('itemMsg').textContent = d.error; }
    }

    async function delItem(itemId) {
        if (!confirm('删除道具 ' + itemId + '?')) return;
        const r = await fetch('/api/player/' + PID + '/item/' + itemId, { method: 'DELETE' });
        if (r.ok) location.reload();
    }
    </script>
</body>

</html>
