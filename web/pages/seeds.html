<!doctype html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="/public/tailwind.css">
    <title>种子验证器 - Starpoint</title>
    <meta http-equiv="refresh" content="10">
    <style>
        .stat { padding: 0.5rem 1rem; border: 1px solid var(--color-outline-variant); border-radius: 0.75rem; display: inline-block; margin: 0.25rem; }
        .stat .label { color: var(--color-on-surface-variant); font-size: 0.7rem; text-transform: uppercase; }
        .stat .value { font-size: 1.3rem; font-weight: bold; }
        .unk { color: #6e7681; } .p1 { color: #d29922; } .p2 { color: #d29922; } .ok { color: #3fb950; } .bad { color: #f85149; }
        .pur { color: #a371f7; }
        .progress { height: 8px; background: var(--color-surface-container-high); border-radius: 4px; overflow: hidden; max-width: 500px; margin: 0.5rem 0; }
        .progress div { height: 100%; float: left; transition: width 0.5s; }
        .bar-ok { background: #3fb950; } .bar-p2 { background: #d29922; } .bar-p1 { background: #9a6b0a; }
        .bar-pur { background: #a371f7; } .bar-bad { background: #f85149; } .bar-unk { background: #6e7681; }
        table { border-collapse: collapse; width: 100%; max-width: 700px; margin-top: 0.5rem; font-size: 0.85rem; }
        th, td { padding: 0.25rem 0.5rem; border: 1px solid var(--color-outline-variant); text-align: left; }
        th { background: var(--color-surface-container-low); }
        .mode-btn { padding: 0.5rem 1rem; border-radius: 2rem; border: 1px solid var(--color-outline-variant); cursor: pointer; font-size: 0.9rem; background: transparent; color: var(--color-on-surface); }
        .mode-btn.active { background: var(--color-primary); color: var(--color-on-primary); border-color: var(--color-primary); font-weight: bold; }
        .prio-btn { padding: 0.25rem 0.75rem; border-radius: 1rem; border: 1px solid var(--color-outline-variant); cursor: pointer; font-size: 0.8rem; background: transparent; color: var(--color-on-surface); }
        .prio-btn.active { background: var(--color-primary); color: var(--color-on-primary); border-color: var(--color-primary); }
    </style>
</head>
<body class="bg-background text-on-surface relative mt-16 m-auto max-w-screen-2xl min-h-screen box-border flex flex-col items-start px-3 pb-3">
    <header class="flex gap-3 items-center md:justify-start justify-center mb-3 w-full">
        <img src="/public/img/logo.png" class="w-9 h-9">
        <h1 class="text-4xl mt-4 font-black mb-4 text-on-background">Starpoint</h1>
    </header>
    <div class="md:grid md:grid-cols-sidebar flex flex-col gap-5 w-full h-fit">
        <nav class="px-3 py-5 gap-3 flex flex-col bg-surface-container-low rounded-3xl h-fit w-full">
            <a href="/" class="px-5 py-3 flex gap-3 items-center rounded-full hover:bg-surface-container-high text-on-surface text-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" class="fill-on-surface"><path d="M520-600v-240h320v240H520ZM120-440v-400h320v400H120Zm400 320v-400h320v400H520Zm-400 0v-240h320v240H120Zm80-400h160v-240H200v240Zm400 320h160v-240H600v240Zm0-480h160v-80H600v80ZM200-200h160v-80H200v80Zm160-320Zm240-160Zm0 240ZM360-280Z"/></svg>首页</a>
            <a href="/player" class="px-5 py-3 flex gap-3 items-center rounded-full hover:bg-surface-container-high text-on-surface text-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" class="fill-on-surface"><path d="M40-160v-112q0-34 17.5-62.5T104-378q62-31 126-46.5T360-440q66 0 130 15.5T616-378q29 15 46.5 43.5T680-272v112H40Zm720 0v-120q0-44-24.5-84.5T666-434q51 6 96 20.5t84 35.5q36 20 55 44.5t19 53.5v120H760ZM360-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47Z"/></svg>玩家</a>
            <a href="/mail" class="px-5 py-3 flex gap-3 items-center rounded-full hover:bg-surface-container-high text-on-surface text-lg transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" class="fill-on-surface"><path d="M160-160q-33 0-56.5-23.5T80-240v-480q0-33 23.5-56.5T160-800h640q33 0 56.5 23.5T880-720v480q0 33-23.5 56.5T800-160H160Z"/></svg>发送邮件</a>
            <div class="px-5 py-3 flex gap-3 items-center bg-primary rounded-full w-full font-bold text-on-primary text-lg">
                <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" class="fill-on-primary"><path d="M480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z"/></svg>种子</div>
        </nav>

        <article class="w-full flex flex-col gap-4">
            <h1 class="text-4xl font-bold text-on-background">种子验证器</h1>

            <!-- Mode & Priority -->
            <div class="flex flex-wrap gap-3 items-center">
                <button id="btnUnknown" class="mode-btn active" onclick="setMode('unknown')">测试池</button>
                <button id="btnPurified" class="mode-btn" onclick="setMode('purified')">净化池</button>
                <span class="text-on-surface-variant mx-2">|</span>
                <span class="text-sm text-on-surface-variant">优先级:</span>
                <button id="prioAll" class="prio-btn active" onclick="setPrio('all')">全部</button>
                <button id="prio5" class="prio-btn" onclick="setPrio('5')">★5优先</button>
                <button id="prio4" class="prio-btn" onclick="setPrio('4')">★4优先</button>
                <button id="prio3" class="prio-btn" onclick="setPrio('3')">★3优先</button>
            </div>

            <!-- Progress bar -->
            <div class="progress" id="progressBar">
                <div class="bar-ok" id="barOk" style="width:0%"></div>
                <div class="bar-pur" id="barPur" style="width:0%"></div>
                <div class="bar-p2" id="barP2" style="width:0%"></div>
                <div class="bar-p1" id="barP1" style="width:0%"></div>
                <div class="bar-bad" id="barBad" style="width:0%"></div>
                <div class="bar-unk" id="barUnk" style="width:0%"></div>
            </div>

            <div id="stats"></div>
            <p id="summary" class="text-sm text-on-surface-variant"></p>

            <!-- Purified 三栏 -->
            <div id="purifiedSection" style="display:none">
                <h3 class="text-lg font-semibold text-on-surface-variant">惊险种子 (PURIFIED)</h3>
                <div style="display:flex; gap:2rem; flex-wrap:wrap" id="purifiedCards"></div>
            </div>

            <!-- Blocked -->
            <div>
                <h3 class="text-lg font-semibold text-on-surface-variant">BLOCKED (待净化)</h3>
                <div id="blockedInfo" class="text-xs text-on-surface-variant"></div>
                <table id="blockedTable" style="display:none">
                    <thead><tr><th>#</th><th>Seed</th><th>设备★</th><th>字符★</th><th>状态</th></tr></thead>
                    <tbody id="blockedBody"></tbody>
                </table>
            </div>

            <!-- Verified -->
            <div>
                <h3 class="text-lg font-semibold text-on-surface-variant">VERIFIED</h3>
                <div id="verifiedInfo" class="text-xs text-on-surface-variant"></div>
                <table id="verifiedTable" style="display:none">
                    <thead><tr><th>#</th><th>Seed</th></tr></thead>
                    <tbody id="verifiedBody"></tbody>
                </table>
            </div>
        </article>
    </div>

    <script>
    function fmt(n) { return n.toLocaleString(); }

    async function setMode(m) {
        await fetch('/api/seeds/mode', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({mode:m}) });
        load();
    }
    async function setPrio(p) {
        await fetch('/api/seeds/mode', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({priority:p}) });
        load();
    }

    async function load() {
        const res = await fetch('/api/seeds/stats');
        const s = await res.json();

        // Mode buttons
        document.getElementById('btnUnknown').className = s.mode === 'unknown' ? 'mode-btn active' : 'mode-btn';
        document.getElementById('btnPurified').className = s.mode === 'purified' ? 'mode-btn active' : 'mode-btn';

        // Priority buttons
        ['All','5','4','3'].forEach(p => {
            const el = document.getElementById('prio'+p);
            if (el) el.className = 'prio-btn' + (s.priority === p.toLowerCase() ? ' active' : '');
        });

        // Stats
        document.getElementById('stats').innerHTML = `
            <span class="stat"><span class="label unk">UNKNOWN</span><br><span class="value unk">${fmt(s.unknown)}</span></span>
            <span class="stat"><span class="label p1">PENDING·1</span><br><span class="value p1">${s.pending1}</span></span>
            <span class="stat"><span class="label p2">PENDING·2</span><br><span class="value p2">${s.pending2}</span></span>
            <span class="stat"><span class="label ok">VERIFIED</span><br><span class="value ok">${fmt(s.verified)}</span></span>
            <span class="stat"><span class="label pur">PURIFIED</span><br><span class="value pur">${fmt(s.purified_total)}</span></span>
            <span class="stat"><span class="label bad">BLOCKED</span><br><span class="value bad">${s.blocked}</span></span>
        `;
        document.getElementById('summary').innerHTML = `安全率 ${s.accuracy}% | 已测 ${fmt(s.tested)} | 覆盖率 ${s.coverage}%`;

        // Progress bar
        const t = s.total;
        document.getElementById('barOk').style.width = (s.verified/t*100)+'%';
        document.getElementById('barPur').style.width = (s.purified_total/t*100)+'%';
        document.getElementById('barP2').style.width = (s.pending2/t*100)+'%';
        document.getElementById('barP1').style.width = (s.pending1/t*100)+'%';
        document.getElementById('barBad').style.width = (s.blocked/t*100)+'%';
        document.getElementById('barUnk').style.width = (s.unknown/t*100)+'%';

        // Purified cards
        if (s.purified_total > 0) {
            document.getElementById('purifiedSection').style.display = '';
            const total = s.purified_total;
            document.getElementById('purifiedCards').innerHTML = `
                <div class="stat"><span class="label" style="color:#f85149">★3 惊险</span><br><span class="value" style="color:#f85149">${s.purified_r3}</span><br><span class="text-xs text-on-surface-variant">${total>0?Math.round(s.purified_r3/total*100):0}%</span></div>
                <div class="stat"><span class="label" style="color:#d29922">★4 惊险</span><br><span class="value" style="color:#d29922">${s.purified_r4}</span><br><span class="text-xs text-on-surface-variant">${total>0?Math.round(s.purified_r4/total*100):0}%</span></div>
                <div class="stat"><span class="label" style="color:#3fb950">★5 惊险</span><br><span class="value" style="color:#3fb950">${s.purified_r5}</span><br><span class="text-xs text-on-surface-variant">${total>0?Math.round(s.purified_r5/total*100):0}%</span></div>
            `;
        } else {
            document.getElementById('purifiedSection').style.display = 'none';
        }

        // Blocked list
        const res2 = await fetch('/api/seeds/list');
        const data = await res2.json();

        const blocked = data.blocked || [];
        document.getElementById('blockedInfo').textContent = blocked.length > 0 ? `共 ${blocked.length} 个` : '暂无';
        if (blocked.length > 0) {
            document.getElementById('blockedTable').style.display = '';
            document.getElementById('blockedBody').innerHTML = blocked.map((b, i) => {
                const hasDevice = b.device !== null;
                const status = hasDevice
                    ? `<span class="pur">→ 下次净化</span>`
                    : `<span class="bad">等待 crash</span>`;
                return `<tr><td>${i+1}</td><td class="bad">${b.seed}</td><td>${b.device||'?'}</td><td>${b.char||'?'}</td><td>${status}</td></tr>`;
            }).join('');
        } else { document.getElementById('blockedTable').style.display = 'none'; }

        // Verified list
        const verified = data.verified || [];
        document.getElementById('verifiedInfo').textContent = verified.length > 0 ? `共 ${verified.length} 个` : '暂无';
        if (verified.length > 0) {
            document.getElementById('verifiedTable').style.display = '';
            document.getElementById('verifiedBody').innerHTML = verified.slice(0, 50).map((s, i) =>
                `<tr><td>${i+1}</td><td class="ok">${s}</td></tr>`
            ).join('');
        } else { document.getElementById('verifiedTable').style.display = 'none'; }
    }

    load();
    </script>
</body>
</html>
